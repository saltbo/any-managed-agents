# oapi-codegen configuration for the AMA Go SDK.
#
# Regenerate with:
#   cd sdk/go && go generate ./...
# or explicitly:
#   cd sdk/go && oapi-codegen -config oapi-codegen.config.yaml ../openapi.json
#
# oapi-codegen must be installed first:
#   go install github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@latest
package: ama
output: ama/ama.gen.go
generate:
  models: true
  client: true
output-options:
  skip-prune: true
  # Keep the generated REST transport under an explicit raw name. The stable Go
  # facade in ama/client.go owns the public Client type.
  client-type-name: APIClient
  overlay:
    path: oapi-codegen.overlay.yaml
compatibility:
  # The `credentialRef` schemas merge an $ref with a nullable override via allOf;
  # the new merge path rejects differing Nullable. Old inlining merge handles it.
  old-merge-schemas: true
