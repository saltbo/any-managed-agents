name = "any-managed-agents-test"
main = "./workers/bootstrap.ts"
compatibility_date = "2026-05-07"
compatibility_flags = ["nodejs_compat"]

[assets]
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*", "/runtime/*"]

[vars]
AMA_DEFAULT_MODEL = "@cf/moonshotai/kimi-k2.6"
AMA_RUNTIME_MODE = "test"
AMA_PI_BRIDGE_PORT = "8788"
OIDC_ISSUER = "https://oidc.test"
OIDC_CLIENT_ID = "ama-test"
AMA_E2E_TEST_AUTH = "true"
AMA_ALLOWED_ORIGINS = "https://example.com"
AMA_WORKERS_AI_ACCOUNT_ID = "test-account"
AMA_RUNTIME_AI_PROXY_TOKEN = "test-runtime-ai-proxy-token"
AMA_CLOUDFLARE_API_TOKEN = "test-cloudflare-token"
AMA_CLOUDFLARE_SECRETS_STORE_ID = "test-secrets-store"
AMA_APPROVED_EXTERNAL_VAULT_PREFIXES = "vault://team/"

[[d1_databases]]
binding = "DB"
database_name = "any-managed-agents-db-test"
database_id = "test"
migrations_dir = "./migrations"

[[durable_objects.bindings]]
name = "SANDBOX"
class_name = "Sandbox"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ManagedAgent"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["Sandbox"]
