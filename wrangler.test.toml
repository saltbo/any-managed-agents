name = "any-managed-agents-test"
main = "./workers/bootstrap.ts"
compatibility_date = "2026-05-07"
compatibility_flags = ["nodejs_compat"]

[assets]
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*", "/agents/*"]

[vars]
AMA_DEFAULT_MODEL = "@cf/meta/llama-3.1-8b-instruct"
FLAREAUTH_ISSUER = "https://flareauth.test"
FLAREAUTH_CLIENT_ID = "ama-test"
FLAREAUTH_REDIRECT_URI = "https://example.com/api/auth/callback"
AMA_SESSION_SECRET = "test-session-secret-at-least-32-bytes"
AMA_COOKIE_SECURE = "true"
AMA_ALLOWED_ORIGINS = "https://example.com"

[[d1_databases]]
binding = "DB"
database_name = "any-managed-agents-db-test"
database_id = "test"
migrations_dir = "./migrations"

[[durable_objects.bindings]]
name = "MANAGED_AGENT"
class_name = "ManagedAgent"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ManagedAgent"]
