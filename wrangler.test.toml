name = "any-managed-agents-test"
main = "./server/worker.ts"
compatibility_date = "2026-05-07"
compatibility_flags = ["nodejs_compat"]

[secrets]
required = []

[assets]
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*", "/runtime/*"]

[vars]
AMA_DEFAULT_MODEL = "@cf/moonshotai/kimi-k2.6"
AMA_RUNTIME_MODE = "test"
OIDC_ISSUER = "https://oidc.test"
OIDC_CLIENT_ID = "ama-test"
OIDC_RUNNER_CLIENT_ID = "ama-runner-test"
AMA_E2E_TEST_AUTH = "true"
AMA_ALLOWED_ORIGINS = "https://example.com"
AMA_VAULT_ENCRYPTION_KEY = "test-vault-encryption-key-for-workers-suite-32-bytes"

[[d1_databases]]
binding = "DB"
database_name = "any-managed-agents-db-test"
database_id = "test"
migrations_dir = "./migrations"

[[r2_buckets]]
binding = "SESSION_EVENTS"
bucket_name = "ama-session-events-test"

[[durable_objects.bindings]]
name = "SANDBOX"
class_name = "Sandbox"

[[durable_objects.bindings]]
name = "SESSION"
class_name = "SessionObject"

[[durable_objects.bindings]]
name = "RUNNER_POOL"
class_name = "RunnerPoolObject"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ManagedAgent"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["Sandbox"]

[[migrations]]
tag = "v3"
new_sqlite_classes = ["RunnerSessionChannelObject"]

[[migrations]]
tag = "v4"
deleted_classes = ["ManagedAgent"]

[[migrations]]
tag = "v5"
renamed_classes = [{ from = "RunnerSessionChannelObject", to = "SessionObject" }]

[[migrations]]
tag = "v6"
new_sqlite_classes = ["RunnerPoolObject"]
