name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Test, Lint, Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - run: npm ci
      - run: go install github.com/rest-sh/restish@v0.21.2
      - run: echo "$HOME/go/bin" >> "$GITHUB_PATH"
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - name: Staging smoke dry-run only
        run: NODE_OPTIONS='--import tsx' npx cucumber-js --dry-run --tags '@implemented and not @planned' --import 'test/e2e/**/*.steps.ts' 'specs/smoke/**/*.feature'
      - run: npm run build
