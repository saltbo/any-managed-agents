name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Test, Lint, Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.2
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: false
      - uses: astral-sh/setup-uv@v6
      - run: pnpm install --frozen-lockfile
      - run: go install github.com/rest-sh/restish@v0.21.2
      # SDK generators for `openapi:check` — pinned to the versions that produced
      # the committed sdk/ artifacts so regeneration is byte-identical in CI.
      - run: go install github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@v2.7.1
      - run: uv tool install openapi-python-client==0.29.0
      - run: echo "$HOME/go/bin" >> "$GITHUB_PATH"
      - run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - run: pnpm run lint
      - run: pnpm run lint:arch
      - run: pnpm run lint:spec
      - run: pnpm run lint:escapes
      - run: pnpm run lint:types
      - run: pnpm run typecheck
      - run: pnpm run contract:check
      - run: pnpm run openapi:check
      - run: pnpm --filter @any-managed-agents/sdk run typecheck
      - run: pnpm --filter @any-managed-agents/sdk run smoke
      # Coverage gate: unit + web (v8). Fails below 95% business / 90% else, per-file.
      - run: pnpm run test:coverage
      # The workerd integration crown (real D1) — proven by pass/fail, not %.
      - run: pnpm exec vitest run --project integration
      # Cross-stack e2e crown: native Playwright (no Cucumber).
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm run e2e
      - run: pnpm run build
