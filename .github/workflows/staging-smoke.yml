name: Runtime Bridge Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * *'

concurrency:
  group: runtime-bridge-smoke
  cancel-in-progress: true

jobs:
  smoke:
    name: Runtime Bridge Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.2
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run smoke:bridge
