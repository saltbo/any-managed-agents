name: ama-runner release

on:
  push:
    tags:
      - "ama-runner-v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cmd/ama-runner
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: false

      - name: Build release artifacts
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#ama-runner-v}"
          build_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          ldflags="-s -w -X main.runnerVersion=${version} -X main.runnerCommit=${GITHUB_SHA} -X main.runnerBuildDate=${build_date}"
          mkdir -p dist
          for target in darwin/arm64 darwin/amd64 linux/arm64 linux/amd64; do
            os="${target%/*}"
            arch="${target#*/}"
            name="ama-runner-v${version}-${os}-${arch}"
            GOOS="$os" GOARCH="$arch" go build -ldflags "$ldflags" -o "dist/${name}/ama-runner" .
            tar -C "dist/${name}" -czf "dist/${name}.tar.gz" ama-runner
            rm -rf "dist/${name}"
          done
          (cd dist && sha256sum *.tar.gz > checksums.txt)

      - name: Publish GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#ama-runner-v}"
          gh release create "$GITHUB_REF_NAME" dist/*.tar.gz dist/checksums.txt \
            --title "ama-runner v${version}" \
            --notes "ama-runner v${version}"
