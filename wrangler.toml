name = "any-managed-agents"
main = "./workers/bootstrap.ts"
compatibility_date = "2026-05-07"
compatibility_flags = ["nodejs_compat"]
workers_dev = true
preview_urls = true

[assets]
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*", "/agents/*", "/runtime/*"]

[vars]
AMA_DEFAULT_MODEL = "@cf/meta/llama-3.1-8b-instruct"
AMA_PI_BRIDGE_PORT = "8788"
FLAREAUTH_ISSUER = "https://auth.example.com"
FLAREAUTH_CLIENT_ID = "replace-with-flareauth-client-id"
FLAREAUTH_REDIRECT_URI = "https://replace-with-worker-host/api/auth/callback"
AMA_COOKIE_SECURE = "true"
AMA_COOKIE_SAME_SITE = "Lax"
AMA_ALLOWED_ORIGINS = "https://replace-with-app-host"

[ai]
binding = "AI"

[[d1_databases]]
binding = "DB"
database_name = "any-managed-agents-db"
database_id = "1b821d59-c74b-47e4-9af3-3d83de81dc1c"
migrations_dir = "./migrations"

[[durable_objects.bindings]]
name = "MANAGED_AGENT"
class_name = "ManagedAgent"

[[durable_objects.bindings]]
name = "SANDBOX"
class_name = "Sandbox"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ManagedAgent"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["Sandbox"]

[[containers]]
class_name = "Sandbox"
image = "registry.cloudflare.com/94a89d03c0fc785c8dcbd3c674d6742a/ama-pi-runtime:0.75.4"
max_instances = 10

[observability]
enabled = true

[env.staging]

[env.staging.vars]
AMA_DEFAULT_MODEL = "@cf/meta/llama-3.1-8b-instruct"
AMA_PI_BRIDGE_PORT = "8788"
FLAREAUTH_ISSUER = "https://auth.example.com"
FLAREAUTH_CLIENT_ID = "replace-with-flareauth-staging-client-id"
FLAREAUTH_REDIRECT_URI = "https://replace-with-staging-worker-host/api/auth/callback"
AMA_COOKIE_SECURE = "true"
AMA_COOKIE_SAME_SITE = "Lax"
AMA_ALLOWED_ORIGINS = "https://replace-with-staging-app-host"

[env.staging.ai]
binding = "AI"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "any-managed-agents-db-staging"
database_id = "8a30ad06-ace4-4cf7-a70d-61adc0e3e042"
migrations_dir = "./migrations"

[[env.staging.durable_objects.bindings]]
name = "MANAGED_AGENT"
class_name = "ManagedAgent"

[[env.staging.durable_objects.bindings]]
name = "SANDBOX"
class_name = "Sandbox"

[[env.staging.containers]]
class_name = "Sandbox"
name = "any-managed-agents-staging-sandbox"
image = "registry.cloudflare.com/94a89d03c0fc785c8dcbd3c674d6742a/ama-pi-runtime:0.75.4"
max_instances = 10
