name = "any-managed-agents"
main = "./server/worker.ts"
compatibility_date = "2026-05-07"
compatibility_flags = ["nodejs_compat"]
workers_dev = true
preview_urls = true
routes = [
  { pattern = "ama.tftt.cc", custom_domain = true },
]

[assets]
binding = "ASSETS"
directory = "./dist/client"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*", "/runtime/*"]

[vars]
AMA_DEFAULT_MODEL = "@cf/moonshotai/kimi-k2.6"
AMA_WORKERS_AI_ACCOUNT_ID = "94a89d03c0fc785c8dcbd3c674d6742a"
OIDC_ISSUER = "https://id.tftt.cc/api/auth"
OIDC_CLIENT_ID = "client_bb3a932954974ebea6da443dd4a3905c"
OIDC_INTROSPECTION_CLIENT_ID = "client_12c843d07a6341629719c05f58021868"
OIDC_RUNNER_CLIENT_ID = "client_ecc75e8aa2c349e7bccea7e542900070"
OIDC_RUNNER_SCOPES = "openid profile email offline_access"
AMA_ALLOWED_ORIGINS = "https://ama.tftt.cc,https://any-managed-agents.saltbo.workers.dev"

[triggers]
crons = ["*/5 * * * *"]

[ai]
binding = "AI"

[[queues.producers]]
binding = "CLOUD_TURNS"
queue = "ama-cloud-turns"

[[queues.consumers]]
queue = "ama-cloud-turns"
max_batch_size = 1
max_retries = 5
dead_letter_queue = "ama-cloud-turns-dlq"

# A cloud turn that keeps failing (infra / DB / queue errors) lands here after
# max_retries instead of being silently dropped, stranding the session. The DLQ
# consumer marks the session errored so clients recover. Provision the queue with
# `wrangler queues create ama-cloud-turns-dlq` before deploying.
[[queues.consumers]]
queue = "ama-cloud-turns-dlq"
max_batch_size = 1
max_retries = 1

[[services]]
binding = "OIDC_PROVIDER"
service = "flareauth-tftt"

[[d1_databases]]
binding = "DB"
database_name = "any-managed-agents-db"
database_id = "1b821d59-c74b-47e4-9af3-3d83de81dc1c"
migrations_dir = "./migrations"

[[durable_objects.bindings]]
name = "SANDBOX"
class_name = "Sandbox"

[[durable_objects.bindings]]
name = "RUNNER_SESSION_CHANNEL"
class_name = "RunnerSessionChannelObject"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ManagedAgent"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["Sandbox"]

[[migrations]]
tag = "v3"
new_sqlite_classes = ["RunnerSessionChannelObject"]

# ManagedAgent (the agents-SDK chat DO) was never bound to a binding and is not
# the v1.0 runtime contract; the class is removed. The v1 tag stays as applied
# history; this migration drops the unused class.
[[migrations]]
tag = "v4"
deleted_classes = ["ManagedAgent"]

[[containers]]
class_name = "Sandbox"
name = "any-managed-agents-sandbox"
image = "registry.cloudflare.com/94a89d03c0fc785c8dcbd3c674d6742a/ama-sandbox:0.10.1-gh1"
max_instances = 20

[observability]
enabled = true

[env.staging]

[env.staging.vars]
AMA_DEFAULT_MODEL = "@cf/moonshotai/kimi-k2.6"
AMA_WORKERS_AI_ACCOUNT_ID = "94a89d03c0fc785c8dcbd3c674d6742a"
OIDC_ISSUER = "https://id.tftt.cc/api/auth"
OIDC_CLIENT_ID = "client_bb3a932954974ebea6da443dd4a3905c"
OIDC_INTROSPECTION_CLIENT_ID = "client_12c843d07a6341629719c05f58021868"
OIDC_RUNNER_CLIENT_ID = "client_ecc75e8aa2c349e7bccea7e542900070"
OIDC_RUNNER_SCOPES = "openid profile email offline_access"
AMA_ALLOWED_ORIGINS = "https://any-managed-agents-staging.saltbo.workers.dev"

[env.staging.triggers]
crons = ["*/5 * * * *"]

[env.staging.ai]
binding = "AI"

[[env.staging.queues.producers]]
binding = "CLOUD_TURNS"
queue = "ama-cloud-turns-staging"

[[env.staging.queues.consumers]]
queue = "ama-cloud-turns-staging"
max_batch_size = 1
max_retries = 5
dead_letter_queue = "ama-cloud-turns-staging-dlq"

[[env.staging.queues.consumers]]
queue = "ama-cloud-turns-staging-dlq"
max_batch_size = 1
max_retries = 1

[[env.staging.services]]
binding = "OIDC_PROVIDER"
service = "flareauth-tftt"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "any-managed-agents-db-staging"
database_id = "8a30ad06-ace4-4cf7-a70d-61adc0e3e042"
migrations_dir = "./migrations"

[[env.staging.durable_objects.bindings]]
name = "SANDBOX"
class_name = "Sandbox"

[[env.staging.durable_objects.bindings]]
name = "RUNNER_SESSION_CHANNEL"
class_name = "RunnerSessionChannelObject"

[[env.staging.containers]]
class_name = "Sandbox"
name = "any-managed-agents-staging-sandbox"
image = "./Dockerfile"
max_instances = 20

[env.e2e]

[env.e2e.vars]
AMA_DEFAULT_MODEL = "@cf/moonshotai/kimi-k2.6"
AMA_WORKERS_AI_ACCOUNT_ID = "94a89d03c0fc785c8dcbd3c674d6742a"
OIDC_ISSUER = "https://oidc.test/api/auth"
OIDC_CLIENT_ID = "ama-e2e"
OIDC_RUNNER_CLIENT_ID = "ama-runner-e2e"
OIDC_RUNNER_SCOPES = "openid profile email offline_access"
AMA_ALLOWED_ORIGINS = "http://localhost:5173"
AMA_E2E_TEST_AUTH = "true"
AMA_RUNTIME_MODE = "test"
AMA_LOCAL_SECRET_STORE = "test"
AMA_APPROVED_EXTERNAL_VAULT_PREFIXES = "vault://ama/e2e/"
AMA_SESSION_SECRET = "e2e-local-test-session-secret-not-for-production"
AMA_VAULT_ENCRYPTION_KEY = "e2e-local-vault-encryption-key-not-for-production"

[env.e2e.triggers]
crons = []

[env.e2e.ai]
binding = "AI"

[[env.e2e.services]]
binding = "OIDC_PROVIDER"
service = "flareauth-tftt"

[[env.e2e.d1_databases]]
binding = "DB"
database_name = "any-managed-agents-db-staging"
database_id = "8a30ad06-ace4-4cf7-a70d-61adc0e3e042"
migrations_dir = "./migrations"

[[env.e2e.durable_objects.bindings]]
name = "SANDBOX"
class_name = "Sandbox"

[[env.e2e.durable_objects.bindings]]
name = "RUNNER_SESSION_CHANNEL"
class_name = "RunnerSessionChannelObject"

[[env.e2e.containers]]
class_name = "Sandbox"
name = "any-managed-agents-e2e-sandbox"
image = "./Dockerfile"
max_instances = 1
